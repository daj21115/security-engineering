title: PsExec-Style Service Installation
id: 100005
status: experimental
description: Detects the installation of a service where the binary is located in the Windows root directory, a common behavior of Impacket-PsExec and randomized service binaries.
author: Dwayne
date: 2026/04/07
tags:
    - attack.persistence
    - attack.privilege_escalation
    - attack.t1543.003
logsource:
    product: windows
    service: system
detection:
    selection:
        EventID: 7045
    selection_path:
        # This matches the %%systemroot%% pattern found in your Wazuh alert
        ImagePath|contains: 
            - 'systemroot'
            - 'C:\Windows\'
    filter_legit:
        # This prevents alerts for normal Windows services in System32
        ImagePath|contains: 'C:\Windows\system32'
    condition: selection and selection_path and not filter_legit
falsepositives:
    - Rare legacy software installers
level: critical