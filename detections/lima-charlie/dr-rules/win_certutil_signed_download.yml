# Purpose: Detect Certutil downloading files while verifying it's the real MS binary.
# MITRE: T1105 - Ingress Tool Transfer
detect:
  event: NEW_PROCESS
  op: and
  rules:
    - op: is
      path: event/FILE_PATH
      value: c:\windows\system32\certutil.exe
    - op: contains
      path: event/COMMAND_LINE
      value: -urlcache
    # Code Identity Check: Ensuring the binary is signed by Microsoft
    - op: is
      path: event/SIGNATURE/CERT_SUBJECT
      value: C=US, S=Washington, L=Redmond, O=Microsoft Corporation, CN=Microsoft Windows
respond:
  - action: report
    name: "ALERT: Verified Microsoft Certutil Download Activity"
  - action: tag
    tag: tool_transfer
